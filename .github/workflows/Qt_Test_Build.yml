name: Qt Test Build

on:
  workflow_dispatch:          # 手动触发
  push:
    branches:
      - main                  # 或者你的默认分支名

jobs:
  # ==================== Ubuntu 构建 ====================
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt and system dependencies via apt
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-tools-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpulse-dev \
            libasound2-dev
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxi-dev

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev libx11-dev libxext-dev

          - name: List build directory contents
          run: ls -la build/
          
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --parallel
        
      - name: Package
        run: |
          mkdir -p release/PictureView        # 1. 目录名（通常与可执行文件同名）
          cp build/PictureView release/PictureView/   # 2. 源文件路径和目标
          tar -czvf PictureView-Linux.tar.gz -C release PictureView   # 3. 压缩包名
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PictureView-Linux        # 4. Artifact 名称
          path: PictureView-Linux.tar.gz # 5. 压缩包路径

