name: Qt Test Build

on:
  workflow_dispatch:          # 手动触发
  push:
    branches:
      - main                  # 或者你的默认分支名

jobs:
  # ==================== Ubuntu 构建 ====================
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt and system dependencies via apt
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-tools-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpulse-dev \
            libasound2-dev
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxi-dev
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p release/DownloadManager
          cp build/DownloadManager release/DownloadManager/
          tar -czvf DownloadManager-Linux.tar.gz -C release DownloadManager

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Linux
          path: DownloadManager-Linux.tar.gz
